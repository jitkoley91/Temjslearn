<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Phase 1 — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #13161f;
  --surface2: #1a1e2b;
  --border: #242838;
  --border2: #2e3449;
  --accent: #f0c040;
  --accent2: #3b82f6;
  --accent3: #10b981;
  --danger: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);min-height:100vh;
  display:flex;overflow:hidden;height:100vh;
}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;min-width:260px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
.sidebar-header{
  padding:20px 18px 14px;border-bottom:1px solid var(--border);
}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.logo span{color:var(--accent);}
.phase-tag{
  font-family:var(--mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;margin-top:4px;
}
/* Progress bar */
.progress-wrap{padding:14px 18px;border-bottom:1px solid var(--border);}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;
}
.progress-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.progress-fill{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
/* Nav list */
.nav{flex:1;overflow-y:auto;padding:10px 0;}
.nav::-webkit-scrollbar{width:4px;}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;cursor:pointer;
  border-left:2px solid transparent;
  transition:all .2s;font-size:14px;font-weight:600;
  color:var(--muted2);
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{
  border-left-color:var(--accent);
  background:rgba(240,192,64,.06);color:var(--accent);
}
.nav-item.done{color:var(--accent3);}
.nav-item.done .nav-icon{background:var(--accent3);}
.nav-num{
  width:22px;height:22px;border-radius:50%;
  background:var(--border2);
  font-family:var(--mono);font-size:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--muted);transition:all .2s;
}
.nav-item.active .nav-num{background:var(--accent);color:#000;font-weight:700;}
.nav-item.done .nav-num{background:var(--accent3);color:#000;}
.check{display:none;font-size:11px;}
.nav-item.done .check{display:inline;}
.nav-item.done .n{display:none;}
.nav-sub{font-size:11px;color:var(--muted);font-weight:400;font-family:var(--mono);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* Top bar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.lesson-title{font-size:20px;font-weight:800;color:#fff;}
.lesson-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
.btn{
  font-family:var(--sans);font-size:13px;font-weight:700;
  padding:8px 18px;border-radius:6px;border:none;cursor:pointer;
  transition:all .2s;letter-spacing:.3px;
}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#f5cf60;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--muted2);color:#fff;}
.btn-success{background:var(--accent3);color:#000;}
.btn-danger{background:var(--danger);color:#fff;}
.topbar-btns{display:flex;gap:8px;}

/* Content area */
.content{flex:1;overflow-y:auto;padding:28px;}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── LESSON SECTIONS ── */
.lesson-section{display:none;}
.lesson-section.active{display:block;}

/* Concept card */
.concept{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;margin-bottom:20px;
}
.concept-header{
  display:flex;align-items:center;gap:10px;margin-bottom:14px;
}
.concept-icon{
  font-size:20px;width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
}
.concept-title{font-size:16px;font-weight:700;color:#fff;}
.concept-body{font-size:14px;color:var(--muted2);line-height:1.7;}
.concept-body p{margin-bottom:10px;}
.concept-body p:last-child{margin-bottom:0;}
.concept-body strong{color:var(--text);}

/* Highlight box */
.highlight{
  background:var(--surface2);border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0;padding:12px 16px;
  margin:12px 0;font-family:var(--mono);font-size:13px;
  color:var(--muted2);line-height:1.8;
}
.highlight .kw{color:#c084fc;}
.highlight .str{color:#86efac;}
.highlight .num{color:#fb923c;}
.highlight .cm{color:#4b5563;font-style:italic;}
.highlight .fn{color:#60a5fa;}
.highlight .tag{color:var(--accent);}

/* Type pills */
.type-pills{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0;}
.pill{
  font-family:var(--mono);font-size:11px;padding:4px 10px;
  border-radius:4px;border:1px solid;
}
.pill.str{color:#86efac;border-color:#86efac33;background:rgba(134,239,172,.06);}
.pill.num{color:#fb923c;border-color:#fb923c33;background:rgba(251,146,60,.06);}
.pill.bool{color:#c084fc;border-color:#c084fc33;background:rgba(192,132,252,.06);}
.pill.null{color:#64748b;border-color:#64748b33;background:rgba(100,116,139,.06);}
.pill.arr{color:#60a5fa;border-color:#60a5fa33;background:rgba(96,165,250,.06);}
.pill.obj{color:var(--accent);border-color:#f0c04033;background:rgba(240,192,64,.06);}

/* ── LIVE EDITOR ── */
.editor-wrap{margin-bottom:20px;}
.editor-label{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  letter-spacing:1px;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.editor-label::after{content:'// edit & run ▶';color:var(--border2);}
.editor-dots{display:flex;gap:4px;}
.editor-dots span{
  width:10px;height:10px;border-radius:50%;
}
.editor-dots .r{background:#ef4444;}
.editor-dots .y{background:#f59e0b;}
.editor-dots .g{background:#10b981;}
.editor-bar{
  background:#161b27;border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:8px 14px;display:flex;align-items:center;
  justify-content:space-between;
}
.editor-filename{font-family:var(--mono);font-size:11px;color:var(--muted);}
textarea.code{
  width:100%;background:#0d1117;
  border:1px solid var(--border);border-top:none;
  color:#e6edf3;font-family:var(--mono);font-size:13px;
  padding:16px;resize:vertical;min-height:120px;
  outline:none;line-height:1.7;
  border-radius:0;
  tab-size:2;
}
.run-bar{
  background:var(--surface2);border:1px solid var(--border);
  border-top:none;border-radius:0 0 var(--radius) var(--radius);
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;
}
.run-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:5px 14px;border-radius:4px;border:none;cursor:pointer;
  background:var(--accent);color:#000;font-weight:700;
  transition:all .2s;
}
.run-btn:hover{background:#f5cf60;}
.output-box{
  background:#020408;border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  padding:12px 16px;font-family:var(--mono);font-size:12px;
  min-height:40px;color:#94a3b8;line-height:1.7;
  display:none;
}
.output-box.has-output{display:block;}
.output-box .out-line{color:#86efac;}
.output-box .err-line{color:#f87171;}
.output-box .log-prefix{color:var(--muted);margin-right:6px;}

/* ── QUIZ ── */
.quiz-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;margin-bottom:20px;
}
.quiz-title{
  font-size:13px;font-weight:700;color:var(--accent);
  font-family:var(--mono);letter-spacing:1px;margin-bottom:14px;
}
.quiz-q{font-size:15px;font-weight:600;color:#fff;margin-bottom:14px;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:6px;
  border:1px solid var(--border2);cursor:pointer;
  transition:all .2s;font-size:14px;
  background:var(--surface2);
}
.quiz-opt:hover{border-color:var(--accent);color:var(--accent);}
.quiz-opt.selected{border-color:var(--accent2);background:rgba(59,130,246,.08);color:var(--accent2);}
.quiz-opt.correct{border-color:var(--accent3);background:rgba(16,185,129,.1);color:var(--accent3);}
.quiz-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.08);color:var(--danger);}
.quiz-opt-key{
  font-family:var(--mono);font-size:10px;
  width:20px;height:20px;border-radius:4px;
  background:var(--border);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
}
.quiz-feedback{
  margin-top:12px;padding:10px 14px;
  border-radius:6px;font-size:13px;
  display:none;
}
.quiz-feedback.show{display:block;}
.quiz-feedback.ok{background:rgba(16,185,129,.08);color:var(--accent3);border:1px solid rgba(16,185,129,.2);}
.quiz-feedback.bad{background:rgba(239,68,68,.08);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.check-btn{
  margin-top:12px;padding:8px 18px;border-radius:6px;
  border:none;cursor:pointer;background:var(--accent2);
  color:#fff;font-family:var(--sans);font-weight:700;font-size:13px;
  transition:all .2s;
}
.check-btn:hover{background:#2563eb;}
.check-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── CHALLENGE ── */
.challenge{
  background:linear-gradient(135deg,rgba(240,192,64,.04),rgba(59,130,246,.04));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:20px;
}
.challenge-header{
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.challenge-badge{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  padding:3px 8px;border-radius:4px;
  background:rgba(240,192,64,.15);color:var(--accent);
  border:1px solid rgba(240,192,64,.3);
}
.challenge-title{font-size:15px;font-weight:700;color:#fff;}
.challenge-desc{font-size:13px;color:var(--muted2);line-height:1.6;margin-bottom:14px;}
.challenge-hint{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  background:var(--surface2);padding:8px 12px;border-radius:4px;
  margin-bottom:12px;
}

/* ── COMPLETE SCREEN ── */
.complete-screen{
  text-align:center;padding:60px 20px;
}
.complete-emoji{font-size:64px;display:block;margin-bottom:20px;
  animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.complete-title{font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;}
.complete-sub{font-size:16px;color:var(--muted2);margin-bottom:30px;}
.xp-badge{
  display:inline-block;font-family:var(--mono);font-size:14px;
  padding:10px 24px;border-radius:8px;
  background:rgba(240,192,64,.12);color:var(--accent);
  border:1px solid rgba(240,192,64,.3);margin-bottom:30px;
}
.score-grid{
  display:flex;justify-content:center;gap:20px;
  flex-wrap:wrap;margin-bottom:30px;
}
.score-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:18px 24px;min-width:100px;
}
.score-val{font-size:28px;font-weight:800;color:#fff;font-family:var(--mono);}
.score-lbl{font-size:11px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;}

/* ── STEP NAVIGATION ── */
.step-nav{
  display:flex;align-items:center;gap:8px;
  padding:14px 28px;border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.step-dots{display:flex;gap:6px;flex:1;justify-content:center;}
.step-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border2);transition:all .2s;cursor:pointer;
}
.step-dot.active{background:var(--accent);width:24px;border-radius:4px;}
.step-dot.done{background:var(--accent3);}
.step-info{font-family:var(--mono);font-size:11px;color:var(--muted);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 18px;
  font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  transform:translateY(80px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:100;display:flex;align-items:center;gap:8px;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--accent3);}
.toast.error{border-color:var(--danger);}

/* XP bar */
.xp-bar{
  padding:10px 18px;border-top:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;gap:10px;
}
.xp-label{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}
.xp-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));
  border-radius:2px;transition:width .5s;}
.xp-val{font-family:var(--mono);font-size:10px;color:var(--accent);}
</style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">JS<span>.</span>learn</div>
    <div class="phase-tag">PHASE 1 · FOUNDATIONS</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-label">
      <span>PROGRESS</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <nav class="nav" id="nav-list"></nav>
  <div class="xp-bar">
    <span class="xp-label">XP</span>
    <div class="xp-track"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    <span class="xp-val" id="xp-val">0</span>
  </div>
</aside>

<!-- ── MAIN ── -->
<div class="main">
  <div class="topbar">
    <div>
      <div class="lesson-title" id="top-title">Welcome</div>
      <div class="lesson-meta" id="top-meta">Select a lesson to begin</div>
    </div>
    <div class="topbar-btns">
      <button class="btn btn-ghost" id="btn-prev" onclick="navigate(-1)">← Prev</button>
      <button class="btn btn-primary" id="btn-next" onclick="navigate(1)">Next →</button>
    </div>
  </div>

  <div class="content" id="content-area"></div>

  <div class="step-nav">
    <span class="step-info" id="step-info">Step 1 of 7</span>
    <div class="step-dots" id="step-dots"></div>
    <span class="step-info" id="xp-earned">0 XP earned</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════
// DATA — All 7 lessons
// ════════════════════════════════════════════════
const lessons = [
{
  id: 1,
  title: "Variables & Data Types",
  icon: "📦",
  tag: "var / let / const",
  xp: 100,
  content: `
<div class="concept">
  <div class="concept-header">
    <div class="concept-icon">📦</div>
    <div class="concept-title">What is a Variable?</div>
  </div>
  <div class="concept-body">
    <p>A variable is a <strong>named container</strong> that stores a value. In JavaScript, you create variables using three keywords:</p>
    <div class="highlight">
      <span class="kw">var</span>  age = 25;      <span class="cm">// old way — avoid using</span><br>
      <span class="kw">let</span>  speed = 1450;   <span class="cm">// modern — value can change</span><br>
      <span class="kw">const</span> name = <span class="str">"Motor A"</span>; <span class="cm">// value CANNOT change</span>
    </div>
    <p><strong>Rule of thumb:</strong> Always use <code>const</code> by default. Switch to <code>let</code> only when the value needs to change.</p>
  </div>
</div>

<div class="concept">
  <div class="concept-header">
    <div class="concept-icon">🏷️</div>
    <div class="concept-title">7 Data Types</div>
  </div>
  <div class="concept-body">
    <p>Every value in JavaScript has a type:</p>
    <div class="type-pills">
      <span class="pill str">string → "hello"</span>
      <span class="pill num">number → 42, 3.14</span>
      <span class="pill bool">boolean → true / false</span>
      <span class="pill null">null → intentional empty</span>
      <span class="pill null">undefined → not yet set</span>
      <span class="pill arr">array → [1, 2, 3]</span>
      <span class="pill obj">object → { key: "val" }</span>
    </div>
    <p>Use <strong>typeof</strong> to check a value's type: <code>typeof 42</code> returns <code>"number"</code></p>
  </div>
</div>`,
  code: `// Declare variables for a sensor reading
const sensorId = "TMP-01";       // string
let temperature = 72;             // number
const isOnline = true;            // boolean
let lastReading = null;           // null (no data yet)

// Check types with typeof
console.log("ID:", sensorId);
console.log("Temp:", temperature, "°C");
console.log("Online:", isOnline);
console.log("Type of temperature:", typeof temperature);
console.log("Type of sensorId:", typeof sensorId);

// Change a let variable
temperature = 85;
console.log("Updated temp:", temperature, "°C");`,
  quiz: {
    q: "Which keyword should you use when a variable's value will never change?",
    opts: ["var","let","const","define"],
    answer: 2,
    explain: "✅ Correct! const declares a constant — a variable that cannot be reassigned after its initial value is set."
  },
  challenge: {
    title: "Declare a Sensor Object",
    desc: "Create 3 variables: a const for sensor name (string), a let for its current value (number), and a boolean for whether it's active. Log all three.",
    starter: `// Your turn! Create 3 variables:\n// 1. const sensorName = ?\n// 2. let currentValue = ?\n// 3. const isActive = ?\n\n// Then console.log all three\n`
  }
},
{
  id: 2,
  title: "Operators",
  icon: "⚙️",
  tag: "arithmetic · comparison · logical",
  xp: 100,
  content: `
<div class="concept">
  <div class="concept-header">
    <div class="concept-icon">➕</div>
    <div class="concept-title">Arithmetic Operators</div>
  </div>
  <div class="concept-body">
    <p>Used for math calculations — essential for sensor thresholds, percentages, and conversions:</p>
    <div class="highlight">
      <span class="num">10</span> + <span class="num">5</span>   <span class="cm">// → 15  (addition)</span><br>
      <span class="num">10</span> - <span class="num">3</span>   <span class="cm">// → 7   (subtraction)</span><br>
      <span class="num">4</span>  * <span class="num">2</span>   <span class="cm">// → 8   (multiplication)</span><br>
      <span class="num">10</span> / <span class="num">4</span>   <span class="cm">// → 2.5 (division)</span><br>
      <span class="num">10</span> % <span class="num">3</span>   <span class="cm">// → 1   (remainder / modulus)</span><br>
      <span class="num">2</span>  ** <span class="num">8</span>  <span class="cm">// → 256 (exponent)</span>
    </div>
  </div>
</div>

<div class="concept">
  <div class="concept-header">
    <div class="concept-icon">🔍</div>
    <div class="concept-title">Comparison & Logical Operators</div>
  </div>
  <div class="concept-body">
    <p>These return <strong>true</strong> or <strong>false</strong> — used in if/else decisions:</p>
    <div class="highlight">
      <span class="cm">// Comparison</span><br>
      temp === <span class="num">72</span>    <span class="cm">// strictly equal (use === not ==)</span><br>
      temp !== <span class="num">72</span>    <span class="cm">// not equal</span><br>
      temp &gt;  <span class="num">80</span>    <span class="cm">// greater than</span><br>
      temp &lt;= <span class="num">100</span>   <span class="cm">// less than or equal</span><br><br>

  document.getElementById('prog-pct').textContent = pct + '%';
  const maxXP = lessons.reduce((a,l) => a+l.xp, 0) * 2;
  const xpPct = Math.min(100, (totalXP / maxXP) * 100);
  document.getElementById('xp-fill').style.width = xpPct + '%';
  document.getElementById('xp-val').textContent = totalXP;
}

// ════════════════════════════════════════════════
// RENDER LESSON
// ════════════════════════════════════════════════
function renderLesson(idx) {
  const l = lessons[idx];
  document.getElementById('top-title').textContent = l.icon + ' ' + l.title;
  document.getElementById('top-meta').textContent = 'Lesson ' + (idx+1) + ' of ' + lessons.length + ' · ' + l.tag + ' · ' + l.xp + ' XP';

  const isQuizDone = quizAnswered[idx] !== undefined;
  const isChallDone = challengesDone.has(idx);
  const isCompleted = completedLessons.has(idx);

  const content = document.getElementById('content-area');
  content.innerHTML = `
    ${l.content}

    <!-- LIVE EDITOR -->
    <div class="editor-wrap">
      <div class="editor-label">
        <div class="editor-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
        script.js
      </div>
      <div class="editor-bar">
        <span class="editor-filename">Try it yourself</span>
      </div>
      <textarea class="code" id="code-${idx}" rows="12">${l.code}</textarea>
      <div class="run-bar">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">▶ console output</span>
        <button class="run-btn" onclick="runCode(${idx})">▶ RUN</button>
      </div>
      <div class="output-box" id="output-${idx}"></div>
    </div>

    <!-- QUIZ -->
    <div class="quiz-wrap">
      <div class="quiz-title">// QUICK CHECK</div>
      <div class="quiz-q">${l.quiz.q}</div>
      <div class="quiz-options" id="quiz-opts-${idx}">
        ${l.quiz.opts.map((o,oi) => `
          <div class="quiz-opt ${isQuizDone?(oi===l.quiz.answer?'correct':(quizAnswered[idx]===oi?'wrong':'')):''}${!isQuizDone?' selectable':''}"
               onclick="selectQuiz(${idx},${oi})"
               id="qopt-${idx}-${oi}">
            <span class="quiz-opt-key">${['A','B','C','D'][oi]}</span>
            ${o}
          </div>
        `).join('')}
      </div>
      <button class="check-btn" id="check-btn-${idx}"
        onclick="checkQuiz(${idx})"
        ${isQuizDone?'disabled':''}>
        ${isQuizDone?'✓ Answered':'Check Answer'}
      </button>
      <div class="quiz-feedback ${isQuizDone?'show ok':''}" id="qfb-${idx}">
        ${isQuizDone?l.quiz.explain:''}
      </div>
    </div>

    <!-- CHALLENGE -->
    <div class="challenge">
      <div class="challenge-header">
        <span class="challenge-badge">⚡ CHALLENGE</span>
        <span class="challenge-title">${l.challenge.title}</span>
        ${isChallDone?'<span style="color:var(--accent3);font-size:13px;margin-left:auto">✓ Done</span>':''}
      </div>
      <div class="challenge-desc">${l.challenge.desc}</div>
      <div class="challenge-hint">💡 Write your code in the editor below, then click RUN</div>
      <div class="editor-bar" style="border-radius:6px 6px 0 0;border:1px solid var(--border);">
        <span class="editor-filename">challenge.js</span>
        ${isChallDone?'':'<span style="font-family:var(--mono);font-size:10px;color:var(--accent3)">+'+l.xp+' XP on complete</span>'}
      </div>
      <textarea class="code" id="chal-${idx}" rows="10">${l.challenge.starter}</textarea>
      <div class="run-bar">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Run your solution</span>
        <button class="run-btn" onclick="runChallenge(${idx})">▶ RUN</button>
      </div>
      <div class="output-box" id="chal-out-${idx}"></div>
    </div>

    <!-- COMPLETE BTN -->
    <div style="text-align:center;padding:20px 0;">
      <button class="btn ${isCompleted?'btn-ghost':'btn-primary'}" onclick="completeLesson(${idx})" style="font-size:15px;padding:12px 32px;">
        ${isCompleted?'✓ Lesson Completed':'Mark as Complete →'}
      </button>
    </div>
  `;
  content.scrollTop = 0;

  // restore selected quiz option
  if (quizAnswered[idx] !== undefined && !isQuizDone) {
    const opt = document.getElementById(`qopt-${idx}-${quizAnswered[idx]}`);
    if (opt) opt.classList.add('selected');
  }
}

// ════════════════════════════════════════════════
// RUN CODE (sandboxed)
// ════════════════════════════════════════════════
function runCode(idx) {
  const code = document.getElementById('code-' + idx).value;
  executeCode(code, 'output-' + idx);
}

function runChallenge(idx) {
  const code = document.getElementById('chal-' + idx).value;
  const outId = 'chal-out-' + idx;
  executeCode(code, outId, () => {
    if (!challengesDone.has(idx)) {
      challengesDone.add(idx);
      totalXP += lessons[idx].xp;
      updateProgress();
      buildDots();
      showToast('⚡ Challenge complete! +' + lessons[idx].xp + ' XP', 'success');
      // refresh to show done state
      const btn = document.querySelector('.challenge span[style*="accent3"]');
    }
  });
}

function executeCode(code, outputId, onSuccess) {
  const outEl = document.getElementById(outputId);
  const logs = [];

  const fakeConsole = {
    log: (...args) => logs.push({ type: 'out', msg: args.map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ') }),
    error: (...args) => logs.push({ type: 'err', msg: args.join(' ') }),
    warn: (...args) => logs.push({ type: 'out', msg: '⚠ ' + args.join(' ') }),
  };

  try {
    const fn = new Function('console', code);
    fn(fakeConsole);
    outEl.innerHTML = logs.length
      ? logs.map(l => `<div class="${l.type==='err'?'err-line':'out-line'}"><span class="log-prefix">›</span>${escHtml(l.msg)}</div>`).join('')
      : '<span style="color:var(--muted)">// no output</span>';
    outEl.classList.add('has-output');
    if (onSuccess) onSuccess();
  } catch(e) {
    outEl.innerHTML = `<div class="err-line">❌ ${escHtml(e.message)}</div>`;
    outEl.classList.add('has-output');
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ════════════════════════════════════════════════
// QUIZ
// ════════════════════════════════════════════════
let selectedQuiz = {};

function selectQuiz(lessonIdx, optIdx) {
  if (quizAnswered[lessonIdx] !== undefined) return;
  selectedQuiz[lessonIdx] = optIdx;
  document.querySelectorAll(`[id^="qopt-${lessonIdx}-"]`).forEach(el => el.classList.remove('selected'));
  document.getElementById(`qopt-${lessonIdx}-${optIdx}`).classList.add('selected');
}

function checkQuiz(lessonIdx) {
  const selected = selectedQuiz[lessonIdx];
  if (selected === undefined) { showToast('Select an answer first!', 'error'); return; }
  const l = lessons[lessonIdx];
  const correct = selected === l.quiz.answer;

  quizAnswered[lessonIdx] = selected;
  const fb = document.getElementById('qfb-' + lessonIdx);
  fb.className = 'quiz-feedback show ' + (correct ? 'ok' : 'bad');

  document.querySelectorAll(`[id^="qopt-${lessonIdx}-"]`).forEach((el, i) => {
    if (i === l.quiz.answer) el.classList.add('correct');
    else if (i === selected && !correct) el.classList.add('wrong');
  });

  if (correct) {
    fb.textContent = l.quiz.explain;
    totalXP += Math.round(l.xp * 0.5);
    updateProgress();
    buildDots();
    showToast('✅ Correct! +' + Math.round(l.xp * 0.5) + ' XP', 'success');
  } else {
    fb.textContent = '❌ Not quite. The correct answer was: ' + l.quiz.opts[l.quiz.answer] + '. ' + l.quiz.explain;
    showToast('Keep trying — check the explanation!', 'error');
  }

  document.getElementById('check-btn-' + lessonIdx).disabled = true;
  document.getElementById('check-btn-' + lessonIdx).textContent = '✓ Answered';
}

// ════════════════════════════════════════════════
// COMPLETE LESSON
// ════════════════════════════════════════════════
function completeLesson(idx) {
  if (!completedLessons.has(idx)) {
    completedLessons.add(idx);
    totalXP += lessons[idx].xp;
    updateProgress();
    showToast('🎉 Lesson ' + (idx+1) + ' complete! +' + lessons[idx].xp + ' XP', 'success');
  }
  buildNav();
  buildDots();

  // Check if all done
  if (completedLessons.size === lessons.length) {
    setTimeout(showComplete, 400);
    return;
  }

  // Auto-advance
  if (idx < lessons.length - 1) {
    setTimeout(() => goToLesson(idx + 1), 600);
  } else {
    renderLesson(idx);
  }
}

function showComplete() {
  const content = document.getElementById('content-area');
  const quizScore = Object.keys(quizAnswered).filter(i => quizAnswered[i] === lessons[i].quiz.answer).length;
  content.innerHTML = `
    <div class="complete-screen">
      <span class="complete-emoji">🏆</span>
      <div class="complete-title">Phase 1 Complete!</div>
      <div class="complete-sub">You've finished all JavaScript Foundations lessons</div>
      <div class="xp-badge">⚡ ${totalXP} Total XP Earned</div>
      <div class="score-grid">
        <div class="score-card">
          <div class="score-val">${lessons.length}</div>
          <div class="score-lbl">LESSONS</div>
        </div>
        <div class="score-card">
          <div class="score-val">${quizScore}/${lessons.length}</div>
          <div class="score-lbl">QUIZ SCORE</div>
        </div>
        <div class="score-card">
          <div class="score-val">${challengesDone.size}</div>
          <div class="score-lbl">CHALLENGES</div>
        </div>
        <div class="score-card">
          <div class="score-val">${totalXP}</div>
          <div class="score-lbl">TOTAL XP</div>
        </div>
      </div>
      <p style="color:var(--muted2);font-size:14px;max-width:400px;margin:0 auto 24px;line-height:1.7;">
        You now know the core building blocks of JavaScript. Next up: <strong style="color:#fff">Phase 2 — Async JS, APIs, and Fetch</strong> — where you'll pull live sensor data from real endpoints.
      </p>
      <button class="btn btn-primary" onclick="goToLesson(0)" style="font-size:15px;padding:12px 32px;">Review from the start</button>
    </div>
  `;
}

// ════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════
function goToLesson(idx) {
  currentLesson = idx;
  buildNav();
  buildDots();
  renderLesson(idx);
}

function navigate(dir) {
  const next = currentLesson + dir;
  if (next >= 0 && next < lessons.length) goToLesson(next);
}

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='success'?'success':type==='error'?'error':'');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════
buildNav();
buildDots();
renderLesson(0);
updateProgress();
</script>
</body>
</html>
