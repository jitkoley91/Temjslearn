<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JS Phase 2 — Interactive Learning</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14;
  --surface: #13161f;
  --surface2: #1a1e2b;
  --border: #242838;
  --border2: #2e3449;
  --accent: #a78bfa;
  --accent2: #38bdf8;
  --accent3: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
  --text: #e2e8f0;
  --muted: #64748b;
  --muted2: #94a3b8;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Syne', sans-serif;
  --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--sans);min-height:100vh;
  display:flex;overflow:hidden;height:100vh;
}

/* ── SIDEBAR ── */
.sidebar{
  width:268px;min-width:268px;background:var(--surface);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
.sidebar-header{
  padding:20px 18px 14px;border-bottom:1px solid var(--border);
}
.logo{font-size:18px;font-weight:800;letter-spacing:-0.5px;color:#fff;}
.logo span{color:var(--accent);}
.phase-tag{
  font-family:var(--mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;margin-top:4px;
}
.phase-link{
  display:inline-block;font-family:var(--mono);font-size:10px;
  color:var(--accent2);border:1px solid rgba(56,189,248,.2);
  padding:2px 7px;border-radius:3px;margin-top:6px;cursor:pointer;
  text-decoration:none;
}
.progress-wrap{padding:14px 18px;border-bottom:1px solid var(--border);}
.progress-label{
  display:flex;justify-content:space-between;
  font-size:11px;color:var(--muted);font-family:var(--mono);margin-bottom:6px;
}
.progress-track{height:4px;background:var(--border2);border-radius:2px;overflow:hidden;}
.progress-fill{
  height:100%;background:var(--accent);border-radius:2px;
  transition:width .5s cubic-bezier(.4,0,.2,1);
}
.nav{flex:1;overflow-y:auto;padding:10px 0;}
.nav::-webkit-scrollbar{width:4px;}
.nav::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;cursor:pointer;
  border-left:2px solid transparent;
  transition:all .2s;font-size:13px;font-weight:600;
  color:var(--muted2);
}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{border-left-color:var(--accent);background:rgba(167,139,250,.06);color:var(--accent);}
.nav-item.done{color:var(--accent3);}
.nav-num{
  width:22px;height:22px;border-radius:50%;background:var(--border2);
  font-family:var(--mono);font-size:10px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;color:var(--muted);transition:all .2s;
}
.nav-item.active .nav-num{background:var(--accent);color:#000;font-weight:700;}
.nav-item.done .nav-num{background:var(--accent3);color:#000;}
.check{display:none;font-size:11px;}
.nav-item.done .check{display:inline;}
.nav-item.done .nn{display:none;}
.nav-sub{font-size:10px;color:var(--muted);font-weight:400;font-family:var(--mono);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.lesson-title{font-size:20px;font-weight:800;color:#fff;}
.lesson-meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px;}
.btn{
  font-family:var(--sans);font-size:13px;font-weight:700;
  padding:8px 18px;border-radius:6px;border:none;cursor:pointer;
  transition:all .2s;letter-spacing:.3px;
}
.btn-primary{background:var(--accent);color:#000;}
.btn-primary:hover{background:#c4b5fd;transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--muted2);border:1px solid var(--border2);}
.btn-ghost:hover{border-color:var(--muted2);color:#fff;}
.topbar-btns{display:flex;gap:8px;}
.content{flex:1;overflow-y:auto;padding:28px;}
.content::-webkit-scrollbar{width:6px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* ── CONCEPT ── */
.concept{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;margin-bottom:20px;
}
.concept-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.concept-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;}
.concept-title{font-size:16px;font-weight:700;color:#fff;}
.concept-body{font-size:14px;color:var(--muted2);line-height:1.7;}
.concept-body p{margin-bottom:10px;}
.concept-body p:last-child{margin-bottom:0;}
.concept-body strong{color:var(--text);}
.concept-body code{
  font-family:var(--mono);font-size:12px;
  background:var(--surface2);padding:1px 5px;border-radius:3px;color:var(--accent2);
}

/* ── CODE HIGHLIGHT ── */
.highlight{
  background:var(--surface2);border-left:3px solid var(--accent);
  border-radius:0 6px 6px 0;padding:14px 16px;
  margin:12px 0;font-family:var(--mono);font-size:12.5px;
  color:var(--muted2);line-height:1.9;
}
.highlight .kw{color:#c084fc;}
.highlight .str{color:#86efac;}
.highlight .num{color:#fb923c;}
.highlight .cm{color:#374151;font-style:italic;}
.highlight .fn{color:#60a5fa;}
.highlight .cls{color:#f0c040;}
.highlight .acc{color:var(--accent);}

/* ── CALLOUT ── */
.callout{
  display:flex;gap:10px;padding:12px 14px;border-radius:6px;
  margin:12px 0;font-size:13px;line-height:1.6;
}
.callout.tip{background:rgba(56,189,248,.07);border:1px solid rgba(56,189,248,.2);color:#7dd3fc;}
.callout.warn{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:#fcd34d;}
.callout.info{background:rgba(167,139,250,.07);border:1px solid rgba(167,139,250,.2);color:#c4b5fd;}
.callout-icon{font-size:16px;flex-shrink:0;margin-top:1px;}

/* ── FLOW DIAGRAM ── */
.flow{
  display:flex;align-items:center;flex-wrap:wrap;gap:4px;
  background:var(--surface2);border-radius:6px;padding:14px;
  margin:12px 0;font-family:var(--mono);font-size:11px;
}
.flow-box{
  padding:6px 12px;border-radius:4px;font-weight:600;
  background:var(--surface);border:1px solid var(--border2);
  color:var(--text);white-space:nowrap;
}
.flow-box.accent{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:var(--accent);}
.flow-box.blue{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:var(--accent2);}
.flow-box.green{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--accent3);}
.flow-box.orange{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--warn);}
.flow-arr{color:var(--muted);font-size:14px;}

/* ── EDITOR ── */
.editor-wrap{margin-bottom:20px;}
.editor-bar{
  background:#161b27;border:1px solid var(--border);
  border-radius:var(--radius) var(--radius) 0 0;
  padding:8px 14px;display:flex;align-items:center;justify-content:space-between;
}
.editor-filename{font-family:var(--mono);font-size:11px;color:var(--muted);}
.editor-dots{display:flex;gap:4px;}
.editor-dots span{width:10px;height:10px;border-radius:50%;}
.editor-dots .r{background:#ef4444;}
.editor-dots .y{background:#f59e0b;}
.editor-dots .g{background:#10b981;}
textarea.code{
  width:100%;background:#0d1117;
  border:1px solid var(--border);border-top:none;
  color:#e6edf3;font-family:var(--mono);font-size:13px;
  padding:16px;resize:vertical;min-height:130px;
  outline:none;line-height:1.7;tab-size:2;
}
.run-bar{
  background:var(--surface2);border:1px solid var(--border);
  border-top:none;border-radius:0 0 var(--radius) var(--radius);
  padding:8px 12px;display:flex;align-items:center;justify-content:space-between;
}
.run-btn{
  font-family:var(--mono);font-size:11px;letter-spacing:1px;
  padding:5px 14px;border-radius:4px;border:none;cursor:pointer;
  background:var(--accent);color:#000;font-weight:700;transition:all .2s;
}
.run-btn:hover{background:#c4b5fd;}
.output-box{
  background:#020408;border:1px solid var(--border);border-top:none;
  border-radius:0 0 var(--radius) var(--radius);
  padding:12px 16px;font-family:var(--mono);font-size:12px;
  min-height:40px;color:#94a3b8;line-height:1.8;display:none;
}
.output-box.has-output{display:block;}
.out-line{color:#86efac;}
.err-line{color:#f87171;}
.warn-line{color:#fcd34d;}
.log-prefix{color:var(--muted);margin-right:6px;}

/* ── QUIZ ── */
.quiz-wrap{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:22px;margin-bottom:20px;
}
.quiz-title{
  font-size:11px;font-weight:700;color:var(--accent);
  font-family:var(--mono);letter-spacing:2px;margin-bottom:14px;
}
.quiz-q{font-size:15px;font-weight:600;color:#fff;margin-bottom:14px;line-height:1.5;}
.quiz-options{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{
  display:flex;align-items:flex-start;gap:10px;
  padding:10px 14px;border-radius:6px;
  border:1px solid var(--border2);cursor:pointer;
  transition:all .2s;font-size:13px;
  background:var(--surface2);line-height:1.5;
}
.quiz-opt:hover:not(.correct):not(.wrong){border-color:var(--accent);color:var(--accent);}
.quiz-opt.selected{border-color:var(--accent2);background:rgba(56,189,248,.07);color:var(--accent2);}
.quiz-opt.correct{border-color:var(--accent3);background:rgba(16,185,129,.08);color:var(--accent3);}
.quiz-opt.wrong{border-color:var(--danger);background:rgba(239,68,68,.06);color:#f87171;}
.quiz-opt-key{
  font-family:var(--mono);font-size:10px;
  width:20px;height:20px;border-radius:4px;
  background:var(--border);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;margin-top:1px;
}
.quiz-feedback{margin-top:12px;padding:10px 14px;border-radius:6px;font-size:13px;display:none;line-height:1.6;}
.quiz-feedback.show{display:block;}
.quiz-feedback.ok{background:rgba(16,185,129,.07);color:var(--accent3);border:1px solid rgba(16,185,129,.2);}
.quiz-feedback.bad{background:rgba(239,68,68,.07);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.check-btn{
  margin-top:12px;padding:8px 18px;border-radius:6px;
  border:none;cursor:pointer;background:var(--accent2);
  color:#fff;font-family:var(--sans);font-weight:700;font-size:13px;transition:all .2s;
}
.check-btn:hover:not(:disabled){background:#0284c7;}
.check-btn:disabled{opacity:.4;cursor:not-allowed;}

/* ── CHALLENGE ── */
.challenge{
  background:linear-gradient(135deg,rgba(167,139,250,.04),rgba(56,189,248,.03));
  border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;margin-bottom:20px;
}
.challenge-badge{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  padding:3px 8px;border-radius:4px;
  background:rgba(167,139,250,.15);color:var(--accent);
  border:1px solid rgba(167,139,250,.3);
}
.challenge-title{font-size:15px;font-weight:700;color:#fff;margin:10px 0 6px;}
.challenge-desc{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:12px;}
.challenge-hint{
  font-family:var(--mono);font-size:11px;color:var(--muted);
  background:var(--surface2);padding:8px 12px;border-radius:4px;margin-bottom:12px;
  border-left:2px solid var(--accent2);
}

/* ── COMPLETE ── */
.complete-screen{text-align:center;padding:50px 20px;}
.complete-emoji{font-size:64px;display:block;margin-bottom:20px;animation:bounce 1s infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-10px)}}
.complete-title{font-size:32px;font-weight:800;color:#fff;margin-bottom:8px;}
.complete-sub{font-size:15px;color:var(--muted2);margin-bottom:24px;}
.xp-badge{
  display:inline-block;font-family:var(--mono);font-size:14px;
  padding:10px 24px;border-radius:8px;
  background:rgba(167,139,250,.12);color:var(--accent);
  border:1px solid rgba(167,139,250,.3);margin-bottom:28px;
}
.score-grid{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;margin-bottom:28px;}
.score-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:16px 22px;min-width:90px;
}
.score-val{font-size:28px;font-weight:800;color:#fff;font-family:var(--mono);}
.score-lbl{font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;margin-top:2px;}

/* ── STEP NAV ── */
.step-nav{
  display:flex;align-items:center;gap:8px;
  padding:12px 28px;border-top:1px solid var(--border);
  background:var(--surface);flex-shrink:0;
}
.step-dots{display:flex;gap:6px;flex:1;justify-content:center;}
.step-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--border2);transition:all .2s;cursor:pointer;
}
.step-dot.active{background:var(--accent);width:24px;border-radius:4px;}
.step-dot.done{background:var(--accent3);}
.step-info{font-family:var(--mono);font-size:11px;color:var(--muted);}

/* ── XP BAR ── */
.xp-bar{
  padding:10px 18px;border-top:1px solid var(--border);
  background:var(--surface);display:flex;align-items:center;gap:10px;
}
.xp-label{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}
.xp-track{flex:1;height:3px;background:var(--border2);border-radius:2px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .5s;}
.xp-val{font-family:var(--mono);font-size:10px;color:var(--accent);}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 18px;
  font-size:13px;color:var(--text);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transform:translateY(80px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  z-index:100;
}
.toast.show{transform:translateY(0);opacity:1;}
.toast.success{border-color:var(--accent3);}
.toast.error{border-color:var(--danger);}

/* ── TWO-COL ── */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:12px 0;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}}
.mini-card{
  background:var(--surface2);border:1px solid var(--border2);
  border-radius:6px;padding:14px;
}
.mini-card-title{font-size:12px;font-weight:700;color:var(--accent2);
  font-family:var(--mono);margin-bottom:8px;letter-spacing:.5px;}
.mini-card .highlight{margin:0;font-size:11.5px;}
</style>
</head>

<script>
// ══════════════════════════════════════════════════════
// PHASE 2 LESSONS
// ══════════════════════════════════════════════════════
const lessons = [

// ── LESSON 1: Scope & Closures ──────────────────────
{
  id:1, icon:"🔭", title:"Scope & Closures", tag:"global · block · closure", xp:120,
  content:`
<div class="concept">
  <div class="concept-header"><div class="concept-icon">🔭</div><div class="concept-title">What is Scope?</div></div>
  <div class="concept-body">
    <p><strong>Scope</strong> determines where a variable is accessible. Think of it like zones on a factory floor — some things are available everywhere, others only inside a specific room.</p>
    <div class="two-col">
      <div class="mini-card">
        <div class="mini-card-title">GLOBAL SCOPE</div>
        <div class="highlight">
<span class="kw">const</span> plant = <span class="str">"Factory A"</span>;<br>
<span class="cm">// accessible ANYWHERE</span>
        </div>
      </div>
      <div class="mini-card">
        <div class="mini-card-title">BLOCK SCOPE</div>
        <div class="highlight">
<span class="kw">if</span> (<span class="kw">true</span>) {<br>
&nbsp;&nbsp;<span class="kw">let</span> local = <span class="str">"inside only"</span>;<br>
}<br>
<span class="cm">// local is gone here</span>
        </div>
      </div>
    </div>
    <p><strong>Rule:</strong> <code>const</code> and <code>let</code> are block-scoped. <code>var</code> is function-scoped (one reason to avoid it).</p>
  </div>
</div>

<div class="concept">
  <div class="concept-header"><div class="concept-icon">🔒</div><div class="concept-title">Closures — Functions that Remember</div></div>
  <div class="concept-body">
    <p>A <strong>closure</strong> is a function that <em>remembers</em> variables from the scope where it was created — even after that scope is gone. This is one of JS's most powerful features.</p>
    <div class="highlight">
<span class="kw">function</span> <span class="fn">makeCounter</span>() {<br>
&nbsp;&nbsp;<span class="kw">let</span> count = <span class="num">0</span>; <span class="cm">// this variable is "enclosed"</span><br>
&nbsp;&nbsp;<span class="kw">return function</span>() {<br>
&nbsp;&nbsp;&nbsp;&nbsp;count++;<br>
&nbsp;&nbsp;&nbsp;&nbsp;<span class="kw">return</span> count;<br>
&nbsp;&nbsp;};<br>
}<br>
<span class="kw">const</span> counter = <span class="fn">makeCounter</span>();<br>
counter(); <span class="cm">// → 1</span><br>
counter(); <span class="cm">// → 2  (count persists!)</span>
    </div>
    <div class="callout tip">
      <span class="callout-icon">💡</span>
      <span>Closures are used everywhere: event handlers, timers, factory functions, and React hooks all rely on them.</span>
    </div>
  </div>
</div>`,
  code:`// SCOPE DEMO
const plantName = "TechEdge Factory";  // global scope

function runMotor() {
  const motorId = "MOT-01";            // function scope
  let rpm = 0;

  if (rpm === 0) {
    let status = "IDLE";               // block scope — only inside {}
    console.log("Status inside block:", status);
  }
  // console.log(status);              // ❌ would crash — status is gone

  console.log("Motor:", motorId, "at", plantName);
}

runMotor();
console.log("Plant:", plantName);

// CLOSURE DEMO — sensor alarm counter
function makeAlarmCounter(sensorId) {
  let alarmCount = 0;         // enclosed variable

  return function(value, threshold) {
    if (value > threshold) {
      alarmCount++;
      console.log(sensorId + " ALARM #" + alarmCount + " → value: " + value);
    } else {
      console.log(sensorId + " OK → " + value + " (alarms so far: " + alarmCount + ")");
    }
  };
}

const checkTemp = makeAlarmCounter("TMP-01");
checkTemp(72, 85);   // OK
checkTemp(91, 85);   // ALARM #1
checkTemp(88, 85);   // ALARM #2
checkTemp(79, 85);   // OK — counter persists at 2`,
  quiz:{
    q:"A closure is a function that…",
    opts:[

  code:`// Simulating DOM events in this sandbox
// In a real HTML file, these would be actual elements

function simulateDOM() {
  // Simulated elements
  const elements = {};
  const listeners = {};

  function el(id) {
    if (!elements[id]) {
      elements[id] = {
        id, _val: "", _text: "",
        innerHTML: "",
        textContent: "",
        classList: { list: [], add(c){ this.list.push(c); }, remove(c){ this.list = this.list.filter(x=>x!==c); } },
        addEventListener(evt, fn) {
          listeners[id + ":" + evt] = fn;
        }
      };
    }
    return elements[id];
  }

  function fire(id, evt, extra = {}) {
    const key = id + ":" + evt;
    if (listeners[key]) {
      listeners[key]({ target: elements[id], type: evt, ...extra });
    }
  }

  // ─── Setup listeners ───
  el("startBtn").addEventListener("click", function(e) {
    console.log("▶ START button clicked by event:", e.type);
    el("statusDisplay").textContent = "RUNNING";
    el("statusDisplay").classList.add("active");
    console.log("Status updated to:", el("statusDisplay").textContent);
  });

  el("stopBtn").addEventListener("click", function(e) {
    console.log("⏹ STOP button clicked");
    el("statusDisplay").textContent = "STOPPED";
    el("statusDisplay").classList.remove("active");
    console.log("Status updated to:", el("statusDisplay").textContent);
  });

  el("speedInput").addEventListener("input", function(e) {
    const speed = e.value || 1200;
    const pct = ((speed / 1800) * 100).toFixed(0);
    console.log("Speed input changed → " + speed + " rpm (" + pct + "% load)");
  });

  // ─── Fire events ───
  console.log("=== Simulating user interactions ===\\n");
  fire("startBtn", "click");
  fire("speedInput", "input", { value: 1450 });
  fire("speedInput", "input", { value: 1760 });
  fire("stopBtn", "click");

  // Event delegation example
  console.log("\\n=== Event Delegation ===");
  const sensorIds = ["TMP-01", "PRS-01", "RPM-01"];
  sensorIds.forEach(id => {
    console.log("Delegated click on sensor card:", id);
  });
}

simulateDOM();`,

{

  content:`
<div class="concept">
  <div class="concept-header"><div class="concept-icon">🤝</div><div class="concept-title">What is a Promise?</div></div>
  <div class="concept-body">
    <p>When JS requests data from a server (like a live sensor API), it doesn't wait around doing nothing. Instead it makes a <strong>Promise</strong> — a placeholder for a value that will arrive later.</p>
    <div class="flow">
      <div class="flow-box blue">fetch(url)</div>
      <div class="flow-arr">→</div>
      <div class="flow-box accent">Promise created</div>
      <div class="flow-arr">→</div>
      <div class="flow-box orange">pending...</div>
      <div class="flow-arr">→</div>
      <div class="flow-box green">fulfilled ✓</div>
      <div class="flow-arr">or</div>
      <div class="flow-box" style="border-color:rgba(239,68,68,.4);color:#f87171">rejected ✗</div>
    </div>
    <p>A Promise is always in one of 3 states: <strong>pending</strong>, <strong>fulfilled</strong>, or <strong>rejected</strong>.</p>
  </div>
</div>

<div class="concept">
  <div class="concept-header"><div class="concept-icon">⛓️</div><div class="concept-title">.then() and .catch()</div></div>
  <div class="concept-body">
    <p>Handle promise results with <code>.then()</code> for success and <code>.catch()</code> for errors. They can be chained:</p>
    <div class="highlight">
fetch(<span class="str">"https://api.example.com/sensors"</span>)<br>
&nbsp;&nbsp;.<span class="fn">then</span>(response => response.<span class="fn">json</span>())   <span class="cm">// parse JSON</span><br>
&nbsp;&nbsp;.<span class="fn">then</span>(data => {<br>
&nbsp;&nbsp;&nbsp;&nbsp;console.<span class="fn">log</span>(<span class="str">"Sensors:"</span>, data);<br>
&nbsp;&nbsp;})<br>
&nbsp;&nbsp;.<span class="fn">catch</span>(error => {<br>
&nbsp;&nbsp;&nbsp;&nbsp;console.<span class="fn">error</span>(<span class="str">"Failed:"</span>, error);<br>
&nbsp;&nbsp;})<br>
&nbsp;&nbsp;.<span class="fn">finally</span>(() => {<br>
&nbsp;&nbsp;&nbsp;&nbsp;console.<span class="fn">log</span>(<span class="str">"Done (success or fail)"</span>);<br>
&nbsp;&nbsp;});
    </div>
    <div class="callout tip">
      <span class="callout-icon">💡</span>
      <span>Each <code>.then()</code> returns a NEW promise — that's what makes chaining work. The value you return from one <code>.then()</code> becomes the input to the next.</span>
    </div>
  </div>
</div>`,
  code:`// Creating Promises manually to understand the concept
function fetchSensorData(sensorId) {
  return new Promise((resolve, reject) => {
    // Simulate network delay with setTimeout
    setTimeout(() => {
      // Simulate: 90% success rate
      const success = Math.random() > 0.1;

      if (success) {
        resolve({
          id: sensorId,
          value: Math.floor(Math.random() * 50) + 60,
          unit: "°C",
          timestamp: new Date().toISOString()
        });
      } else {
        reject(new Error("Sensor " + sensorId + " offline"));
      }
    }, 100); // 100ms delay
  });
}

// .then() chain
console.log("Fetching sensor data...");

fetchSensorData("TMP-01")
  .then(data => {
    console.log("✅ Raw data received:", data.id);
    return data; // pass to next .then()
  })
  .then(data => {
    const formatted = data.id + ": " + data.value + " " + data.unit;
    console.log("✅ Formatted:", formatted);
    return formatted;
  })
  .catch(err => {
    console.log("❌ Error:", err.message);
  })
  .finally(() => {
    console.log("Request complete (always runs)");
  });

// Promise.all — run multiple requests in parallel
Promise.all([
  fetchSensorData("TMP-01"),
  fetchSensorData("PRS-01"),
  fetchSensorData("RPM-01"),
])
.then(results => {
  console.log("\\n=== All sensors fetched ===");
  results.forEach(r => console.log(r.id + ":", r.value, r.unit));
})
.catch(err => console.log("One failed:", err.message));`,
  quiz:{
    q:"What happens when you return a value inside a .then() callback?",
    opts:[
      "The entire promise chain stops",
      "The value is logged to the console automatically",
      "It becomes the input value to the next .then() in the chain",
      "It triggers the .catch() block"
    ],
    answer:2,
    explain:"✅ Correct! Returning a value from .then() wraps it in a new Promise and passes it as the argument to the next .then(). This is what makes promise chaining so powerful."
  },
  challenge:{
    title:"Promise.all with Error Handling",
    desc:"Create a function fetchWithFallback(id) that returns a Promise. If the id starts with 'FAIL-', reject it. Otherwise resolve with a fake reading. Use Promise.all to fetch 4 sensors and catch any failure.",
    starter:`function fetchWithFallback(id) {
  return new Promise((resolve, reject) => {
    if (id.startsWith("FAIL-")) {
      reject(new Error(id + " is offline"));
    } else {
      resolve({ id: id, value: Math.floor(Math.random()*100) });
    }
  });
}

// Fetch 4 sensors — mix of good and bad IDs
Promise.all([
  fetchWithFallback("TMP-01"),
  fetchWithFallback("PRS-01"),
  fetchWithFallback("FAIL-03"),  // will reject
  fetchWithFallback("HUM-01"),
])
.then(results => {
  results.forEach(r => console.log("✅", r.id, "→", r.value));
})
.catch(err => {
  console.log("❌ Promise.all failed:", err.message);
  console.log("Tip: use Promise.allSettled() to handle partial failures!");
});
`
  }
},

  code:`// Simulated async sensor API

// ── Custom Error (Lesson 6) ──

  constructor(id, msg) { super(msg); this.name="SensorError"; this.sensorId=id; }

// ── Simulated API (Promises, Lesson 4) ──

  return [
    { sensor_id:"TMP-01", raw_value:92,   max:100, unit:"°C",  zone:"A" },
    { sensor_id:"PRS-01", raw_value:5.8,  max:8,   unit:"bar", zone:"A" },
    { sensor_id:"RPM-01", raw_value:1810, max:1800,unit:"rpm", zone:"B" },
    { sensor_id:"HUM-01", raw_value:61,   max:100, unit:"%",   zone:"B" },
    { sensor_id:"CUR-01", raw_value:null, max:30,  unit:"A",   zone:"A" }, // bad data
  ];
}

// ── Validate (Lesson 6 — defensive coding) ──
function validateSensor({ sensor_id, raw_value, max }) {
  if (raw_value === null || raw_value === undefined)
    throw new SensorError(sensor_id, "Missing value");
  if (typeof raw_value !== "number")
    throw new SensorError(sensor_id, "Value must be number");
  return true;
}

// ── Transform (HOF Lesson 2 + ES6 Lesson 7) ──
function transformSensor({ sensor_id: id, raw_value: value, max, unit, zone }) {
  const pct = ((value / max) * 100);
  const status = pct >= 100 ? "DANGER" : pct >= 85 ? "WARN" : "OK";
  return { id, value, max, unit, zone, pct: pct.toFixed(1), status };
}

// ── Render (DOM concepts, Lesson 3) ──
function renderDashboard(sensors) {
  const icons = { OK:"🟢", WARN:"🟡", DANGER:"🔴" };
  console.log("╔══════════════════════════════════╗");
  console.log("║      SENSOR DASHBOARD             ║");
  console.log("╚══════════════════════════════════╝");

  // Group by zone using reduce (HOF)
  const byZone = sensors.reduce((acc, s) => {
    acc[s.zone] = [...(acc[s.zone] ?? []), s];
    return acc;
  }, {});

  Object.entries(byZone).forEach(([zone, zoneSensors]) => {
    console.log(\`\\n  Zone \${zone}:\`);
    zoneSensors.forEach(({ id, value, unit, pct, status }) => {
      console.log(\`  \${icons[status]} \${id}: \${value}\${unit} (\${pct}%) [\${status}]\`);
    });
  });

  // Summary stats using HOF
  const avgLoad = (sensors.reduce((sum, s) => sum + parseFloat(s.pct), 0) / sensors.length).toFixed(1);
  const alerts = sensors.filter(s => s.status !== "OK");
  console.log(\`\\n  Avg load: \${avgLoad}% | Alerts: \${alerts.length}/\${sensors.length}\`);
}

// ── MAIN (async/await, Lesson 5) ──
async function main() {
  console.log("Loading dashboard...\\n");
  const good = [], failed = [];

  try {
    const raw = await fetchSensorAPI(); // await the API

    // validate + separate good/bad (forEach + try/catch)
    raw.forEach(s => {
      try {
        validateSensor(s);
        good.push(transformSensor(s)); // transform valid ones
      } catch(err) {
        failed.push({ id: s.sensor_id, reason: err.message });

    if (failed.length) {

      failed.forEach(f => console.log(\`  ❌ \${f.id}: \${f.reason}\`));
    }

  } catch(err) {
    console.log("Fatal error:", err.message);
  }
}

main();`,

// ══════════════════════════════════════════════════════
let currentLesson = 0;
let completedLessons = new Set();
let totalXP = 0;
let quizAnswered = {};
let selectedQuiz = {};
let challengesDone = new Set();

// ══════════════════════════════════════════════════════
// NAV
// ══════════════════════════════════════════════════════
function buildNav() {
  document.getElementById('nav-list').innerHTML = lessons.map((l,i) => `
    <div class="nav-item ${i===currentLesson?'active':''} ${completedLessons.has(i)?'done':''}"
         onclick="goToLesson(${i})">
      <div class="nav-num">
        <span class="nn">${i+1}</span><span class="check">✓</span>
      </div>
      <div>
        <div>${l.icon} ${l.title}</div>
        <div class="nav-sub">${l.tag}</div>
      </div>
    </div>`).join('');
}

function buildDots() {
  document.getElementById('step-dots').innerHTML = lessons.map((l,i) => `
    <div class="step-dot ${i===currentLesson?'active':''} ${completedLessons.has(i)?'done':''}"
         onclick="goToLesson(${i})" title="${l.title}"></div>`).join('');
  document.getElementById('step-info').textContent = `Step ${currentLesson+1} of ${lessons.length}`;
  document.getElementById('xp-earned').textContent = totalXP + ' XP earned';
}

function updateProgress() {
  const pct = Math.round((completedLessons.size / lessons.length) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
  const maxXP = lessons.reduce((a,l)=>a+l.xp,0)*2;
  document.getElementById('xp-fill').style.width = Math.min(100,(totalXP/maxXP)*100)+'%';
  document.getElementById('xp-val').textContent = totalXP;
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function renderLesson(idx) {
  const l = lessons[idx];
  document.getElementById('top-title').textContent = l.icon + ' ' + l.title;
  document.getElementById('top-meta').textContent =
    `Lesson ${idx+1} of ${lessons.length} · ${l.tag} · ${l.xp} XP`;

  const isDone = completedLessons.has(idx);
  const isQDone = quizAnswered[idx] !== undefined;
  const isCDone = challengesDone.has(idx);

  document.getElementById('content-area').innerHTML = `
    ${l.content}

    <div class="editor-wrap">
      <div class="editor-bar">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="editor-dots"><span class="r"></span><span class="y"></span><span class="g"></span></div>
          <span class="editor-filename">script.js — try it live</span>
        </div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">edit & run ▶</span>
      </div>
      <textarea class="code" id="code-${idx}" rows="14">${l.code}</textarea>
      <div class="run-bar">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">▶ output</span>
        <button class="run-btn" onclick="runCode(${idx})">▶ RUN</button>
      </div>
      <div class="output-box" id="output-${idx}"></div>
    </div>

    <div class="quiz-wrap">
      <div class="quiz-title">// QUICK CHECK</div>
      <div class="quiz-q">${l.quiz.q}</div>
      <div class="quiz-options">
        ${l.quiz.opts.map((o,oi)=>`
          <div class="quiz-opt ${isQDone?(oi===l.quiz.answer?'correct':(quizAnswered[idx]===oi?'wrong':'')):''}
               " onclick="selectQuiz(${idx},${oi})" id="qopt-${idx}-${oi}">
            <span class="quiz-opt-key">${['A','B','C','D'][oi]}</span>${o}
          </div>`).join('')}
      </div>
      <button class="check-btn" onclick="checkQuiz(${idx})" ${isQDone?'disabled':''}>
        ${isQDone?'✓ Answered':'Check Answer'}
      </button>
      <div class="quiz-feedback ${isQDone?'show ok':''}" id="qfb-${idx}">
        ${isQDone?l.quiz.explain:''}
      </div>
    </div>

    <div class="challenge">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span class="challenge-badge">⚡ CHALLENGE</span>
        ${isCDone?'<span style="color:var(--accent3);font-size:12px;margin-left:auto">✓ Done +'+l.xp+' XP</span>':'<span style="font-family:var(--mono);font-size:10px;color:var(--accent);margin-left:auto">+'+l.xp+' XP</span>'}
      </div>
      <div class="challenge-title">${l.challenge.title}</div>
      <div class="challenge-desc">${l.challenge.desc}</div>
      <div class="challenge-hint">💡 Edit the starter code below, then click RUN to test your solution</div>
      <div class="editor-bar" style="border-radius:6px 6px 0 0;border:1px solid var(--border);">
        <span class="editor-filename">challenge.js</span>
      </div>
      <textarea class="code" id="chal-${idx}" rows="12">${l.challenge.starter}</textarea>
      <div class="run-bar">
        <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Run your solution</span>
        <button class="run-btn" onclick="runChallenge(${idx})">▶ RUN</button>
      </div>
      <div class="output-box" id="chal-out-${idx}"></div>
    </div>

    <div style="text-align:center;padding:20px 0 10px;">
      <button class="btn ${isDone?'btn-ghost':'btn-primary'}" onclick="completeLesson(${idx})"
        style="font-size:15px;padding:12px 32px;">
        ${isDone?'✓ Completed — Next →':'Mark Complete & Continue →'}
      </button>
    </div>`;

  document.getElementById('content-area').scrollTop = 0;
}

// ══════════════════════════════════════════════════════
// CODE RUNNER
// ══════════════════════════════════════════════════════
function runCode(idx) { executeCode(document.getElementById('code-'+idx).value,'output-'+idx); }
function runChallenge(idx) {
  executeCode(document.getElementById('chal-'+idx).value,'chal-out-'+idx,()=>{
    if (!challengesDone.has(idx)) {
      challengesDone.add(idx);
      totalXP += lessons[idx].xp;
      updateProgress(); buildDots();
      showToast('⚡ Challenge done! +'+lessons[idx].xp+' XP','success');
    }
  });
}

function executeCode(code, outId, onSuccess) {
  const el = document.getElementById(outId);
  const logs = [];
  const con = {
    log:  (...a) => logs.push({t:'out', m: a.map(x=>typeof x==='object'?JSON.stringify(x,null,2):String(x)).join(' ')}),
    error:(...a) => logs.push({t:'err', m: a.join(' ')}),
    warn: (...a) => logs.push({t:'warn',m: a.join(' ')}),
    table:(...a) => logs.push({t:'out', m:'[table] '+JSON.stringify(a[0])}),
    group:(...a) => logs.push({t:'out', m:'▼ '+a.join(' ')}),
    groupEnd:()=>{},
    time: (l)=>logs.push({t:'out',m:'⏱ timer started: '+l}),
    timeEnd:(l)=>logs.push({t:'out',m:'⏱ '+l+': done'}),
  };
  try {
    const fn = new Function('console','Promise','setTimeout','Math','JSON','Date','Object','Array','Error',
      'SensorError', // allow custom error in scope
      code);
    // Run with a mock SensorError class available
    class SensorError extends Error {
      constructor(id,m){super(m);this.name="SensorError";this.sensorId=id;}
    }
    fn(con,Promise,setTimeout,Math,JSON,Date,Object,Array,Error,SensorError);
    setTimeout(()=>{
      el.innerHTML = logs.length
        ? logs.map(l=>`<div class="${l.t==='err'?'err-line':l.t==='warn'?'warn-line':'out-line'}"><span class="log-prefix">›</span>${esc(l.m)}</div>`).join('')
        : '<span style="color:var(--muted)">// no output</span>';
      el.classList.add('has-output');
      if(onSuccess&&logs.some(l=>l.t!=='err'))onSuccess();
    },200);
  } catch(e) {
    el.innerHTML=`<div class="err-line">❌ ${esc(e.message)}</div>`;
    el.classList.add('has-output');
  }
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ══════════════════════════════════════════════════════
// QUIZ
// ══════════════════════════════════════════════════════
function selectQuiz(li, oi) {
  if (quizAnswered[li]!==undefined) return;
  selectedQuiz[li]=oi;
  document.querySelectorAll(`[id^="qopt-${li}-"]`).forEach(e=>e.classList.remove('selected'));
  document.getElementById(`qopt-${li}-${oi}`)?.classList.add('selected');
}
function checkQuiz(li) {
  const sel = selectedQuiz[li];
  if (sel===undefined){showToast('Select an answer first!','error');return;}
  const l=lessons[li]; const ok=sel===l.quiz.answer;
  quizAnswered[li]=sel;
  const fb=document.getElementById('qfb-'+li);
  fb.className='quiz-feedback show '+(ok?'ok':'bad');
  document.querySelectorAll(`[id^="qopt-${li}-"]`).forEach((e,i)=>{
    if(i===l.quiz.answer)e.classList.add('correct');
    else if(i===sel&&!ok)e.classList.add('wrong');
  });
  if(ok){
    fb.textContent=l.quiz.explain;
    totalXP+=Math.round(l.xp*0.5);
    updateProgress();buildDots();
    showToast('✅ Correct! +'+Math.round(l.xp*0.5)+' XP','success');
  } else {
    fb.textContent='❌ Not quite. Correct: '+l.quiz.opts[l.quiz.answer]+'. '+l.quiz.explain;
    showToast('Study the explanation and try again!','error');
  }
  const btn=document.querySelector(`#qfb-${li}`)?.previousElementSibling;
  if(btn){btn.disabled=true;btn.textContent='✓ Answered';}
}

// ══════════════════════════════════════════════════════
// COMPLETE
// ══════════════════════════════════════════════════════
function completeLesson(idx) {
  if(!completedLessons.has(idx)){
    completedLessons.add(idx);
    totalXP+=lessons[idx].xp;
    updateProgress();
    showToast('🎉 Lesson '+(idx+1)+' complete! +'+lessons[idx].xp+' XP','success');
  }
  buildNav();buildDots();
  if(completedLessons.size===lessons.length){setTimeout(showComplete,400);return;}
  if(idx<lessons.length-1)setTimeout(()=>goToLesson(idx+1),500);
  else renderLesson(idx);
}

function showComplete() {
  const qScore=Object.keys(quizAnswered).filter(i=>quizAnswered[i]===lessons[i].quiz.answer).length;
  document.getElementById('content-area').innerHTML=`
    <div class="complete-screen">
      <span class="complete-emoji">🚀</span>
      <div class="complete-title">Phase 2 Complete!</div>
      <div class="complete-sub">You've mastered Advanced JavaScript</div>
      <div class="xp-badge">⚡ ${totalXP} Total XP Earned</div>
      <div class="score-grid">
        <div class="score-card"><div class="score-val">${lessons.length}</div><div class="score-lbl">LESSONS</div></div>
        <div class="score-card"><div class="score-val">${qScore}/${lessons.length}</div><div class="score-lbl">QUIZ SCORE</div></div>
        <div class="score-card"><div class="score-val">${challengesDone.size}</div><div class="score-lbl">CHALLENGES</div></div>
        <div class="score-card"><div class="score-val">${totalXP}</div><div class="score-lbl">TOTAL XP</div></div>
      </div>
      <p style="color:var(--muted2);font-size:14px;max-width:440px;margin:0 auto 24px;line-height:1.8;">
        You can now build <strong style="color:#fff">async dashboards</strong> that fetch live data, handle errors gracefully, and transform data with modern ES6+ syntax.<br><br>
        Next: <strong style="color:var(--accent)">Phase 3 — Frameworks</strong> (React, component architecture, state management).
      </p>
      <button class="btn btn-primary" onclick="goToLesson(0)" style="font-size:15px;padding:12px 32px;">Review from start</button>
    </div>`;
}

// ══════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════
function goToLesson(idx){ currentLesson=idx; buildNav(); buildDots(); renderLesson(idx); }
function navigate(dir){ const n=currentLesson+dir; if(n>=0&&n<lessons.length)goToLesson(n); }

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+(type==='success'?'success':type==='error'?'error':'');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
buildNav(); buildDots(); renderLesson(0); updateProgress();
</script>
</body>
</html>
